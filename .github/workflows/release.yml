# ============================================================================
# release.yml — auto-update the Homebrew tap formula when a release ships
# ============================================================================
#
# When a release is *published* (not just drafted), this workflow:
#
#   1. Downloads the signed + notarized CLI ZIP asset attached to the release.
#   2. Computes the asset's SHA-256.
#   3. Regenerates `Formula/swiftpandas.rb` in `kiraa-ai/homebrew-tap` with
#      the new `url`, `sha256`, and `version` values.
#   4. Commits to that tap repo on `main`.
#
# After this fires, `brew install kiraa-ai/tap/swiftpandas` resolves to the
# new build with no further manual intervention.
#
# ── Prerequisites (one-time setup) ──────────────────────────────────────────
#
# Create a fine-grained Personal Access Token with `Contents: write` on the
# `kiraa-ai/homebrew-tap` repository, then add it to this repo's secrets as
# `TAP_REPO_TOKEN`:
#
#   gh secret set TAP_REPO_TOKEN \
#     --repo kiraa-ai/kiraa-swift-pandas \
#     --body "<PAT>"
#
# Why a PAT instead of the default `GITHUB_TOKEN`? The default token is
# scoped to **this** repo only; it can't push to the separate tap repo.
#
# ── What the workflow does NOT do ───────────────────────────────────────────
#
# It does NOT build the binary. That happens locally on a maintainer's Mac
# via `scripts/build-release.sh`, which has access to the Apple Developer ID
# certificate and notarization credentials in the keychain. This workflow
# only updates the formula once those signed artifacts are already attached
# to the GitHub Release.
# ============================================================================

name: Update Homebrew tap on release

on:
  release:
    types: [published]

# Serialise concurrent releases so we never race two formula updates.
concurrency:
  group: tap-formula-update
  cancel-in-progress: false

permissions:
  contents: read     # we don't write to this repo; everything goes to the tap

jobs:
  update-tap-formula:
    name: Update kiraa-ai/homebrew-tap formula
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - name: Sanity-check trigger
        env:
          TAG:  ${{ github.event.release.tag_name }}
          NAME: ${{ github.event.release.name }}
        run: |
          echo "Release tag:  $TAG"
          echo "Release name: $NAME"
          if [ -z "$TAG" ]; then
            echo "::error::No tag on release event; aborting."
            exit 1
          fi

      - name: Download CLI ZIP asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          # `scripts/build-release.sh` emits assets matching this pattern.
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'swiftpandas-*-macos*-universal.zip'
          ls -lh swiftpandas-*-macos*-universal.zip

      - name: Compute SHA-256 + build formula
        id: formula
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          ZIP=$(ls swiftpandas-*-macos*-universal.zip | head -1)
          if [ -z "$ZIP" ]; then
            echo "::error::No CLI ZIP attached to release $TAG."
            exit 1
          fi
          SHA256=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          VERSION="${TAG#v}"                              # strip leading 'v'
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP}"

          echo "Asset:   $ZIP"
          echo "SHA-256: $SHA256"
          echo "Version: $VERSION"
          echo "URL:     $URL"

          # Generate the new formula.
          cat > formula.rb <<EOF
          # frozen_string_literal: true

          # swiftpandas — fast CSV transformation tool with resident-memory daemon
          #
          # Auto-generated by release.yml in kiraa-ai/kiraa-swift-pandas.
          # Do NOT edit url/sha256/version by hand; they are rewritten on every
          # release. Tap-specific docs live in this repo's README.
          class Swiftpandas < Formula
            desc "Fast CSV transformation tool with resident-memory daemon"
            homepage "https://github.com/kiraa-ai/kiraa-swift-pandas"
            license "Apache-2.0"

            url     "${URL}"
            sha256  "${SHA256}"
            version "${VERSION}"

            depends_on macos: :ventura

            head do
              url "https://github.com/kiraa-ai/kiraa-swift-pandas.git", branch: "main"
              depends_on xcode: ["15.0", :build]
            end

            def install
              if build.head?
                system "swift", "build", "-c", "release", "--arch", "arm64", "--arch", "x86_64"
                bin.install ".build/apple/Products/Release/swiftpandas"
              else
                bin.install "swiftpandas"
                system "xattr", "-dr", "com.apple.quarantine", bin/"swiftpandas"
              end
            end

            service do
              run [opt_bin/"swiftpandas", "server", "start", "--foreground"]
              keep_alive true
              working_dir var
              log_path        var/"log/swiftpandas.log"
              error_log_path  var/"log/swiftpandas.err"
              environment_variables(
                SWIFTPANDAS_RUNTIME_DIR: var/"swiftpandas",
              )
            end

            test do
              output = shell_output("#{bin}/swiftpandas --help")
              assert_match "swiftpandas", output
              assert_match "server",      output
            end
          end
          EOF
          # Preview the generated file in the workflow log for auditing.
          echo "--- generated formula ---"
          cat formula.rb
          echo "--- end ---"

      - name: Push formula to kiraa-ai/homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
          TAG:      ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::TAP_REPO_TOKEN secret is not set. See workflow header for setup steps."
            exit 1
          fi
          VERSION="${TAG#v}"
          # `gh api PUT` requires the current file's SHA for an update. If the
          # file doesn't exist yet (first run), the SHA query returns empty
          # and we just create it.
          CURRENT_SHA=$(
            gh api /repos/kiraa-ai/homebrew-tap/contents/Formula/swiftpandas.rb \
              --jq .sha 2>/dev/null || true
          )
          B64=$(base64 -i formula.rb | tr -d '\n')
          if [ -n "$CURRENT_SHA" ]; then
            gh api -X PUT /repos/kiraa-ai/homebrew-tap/contents/Formula/swiftpandas.rb \
              -f message="swiftpandas ${VERSION}" \
              -f content="$B64" \
              -f sha="$CURRENT_SHA"
          else
            gh api -X PUT /repos/kiraa-ai/homebrew-tap/contents/Formula/swiftpandas.rb \
              -f message="swiftpandas ${VERSION} (initial)" \
              -f content="$B64"
          fi
          echo "Updated tap formula to ${VERSION}."
